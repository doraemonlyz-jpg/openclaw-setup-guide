name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          # Expose agent-facing files at site root for fetchable URLs
          cp llms.txt _site/llms.txt
          cp AGENTS.md _site/AGENTS.md
          cp quickstart.sh _site/quickstart.sh
          cp README.md _site/README.md
          cp _site/index.html _site/404.html

      - name: Replace placeholders with actual owner/repo
        env:
          OWNER: ${{ github.repository_owner }}
          REPO:  ${{ github.event.repository.name }}
        run: |
          echo "Owner: $OWNER · Repo: $REPO"
          # GNU sed on ubuntu-latest
          find _site -type f \( -name '*.html' -o -name '*.md' -o -name '*.txt' -o -name '*.sh' -o -name '*.js' -o -name '*.css' \) \
            -exec sed -i "s|REPLACE_OWNER|${OWNER}|g; s|openclaw-setup-guide|${REPO}|g" {} +

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
